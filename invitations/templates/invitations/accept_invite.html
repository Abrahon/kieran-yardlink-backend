<!DOCTYPE html>
<html>
<head>
    <title>Accept Invitation</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            width:400px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#28a745;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .message{
            margin-top:15px;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Complete Registration</h2>

    <p>Email: {{ invitation.email }}</p>

    <form id="accept-form">

        {% csrf_token %}

        <input
            type="text"
            id="name"
            placeholder="Enter your name"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Create password"
            required
        >

        <button type="submit">
            Accept Invitation
        </button>

    </form>

    <div class="message" id="message"></div>

</div>

<script>

const token = "{{ invitation.token }}";

/* -------------------------
   GET CSRF TOKEN
------------------------- */
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

const csrftoken = getCookie('csrftoken');


/* -------------------------
   FORM SUBMIT
------------------------- */
document.getElementById("accept-form")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;

    const response = await fetch(
        `/api/invitations/accept/${token}/`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken
            },
            body: JSON.stringify({
                name,
                password
            })
        }
    );

    const data = await response.json();

    const message = document.getElementById("message");

    if(response.ok){
        message.style.color = "green";
        message.innerText = "Invitation accepted successfully";

        setTimeout(() => {
            window.location.href = "/invitation-success/";
        }, 1500);

    } else {
        message.style.color = "red";
        message.innerText = data.detail || "Something went wrong";
    }
});
</script>

</body>
</html>
